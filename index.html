<!doctype html>
<html>
  <head>
    <title>My Tasks</title>
    <style>
      * {
        padding: 10px 0 0 0;
      }
      label {
        display: inline-flex;
        width: 100px;
      }
      .comment {
        position: relative;
        left: 105px;
        color: tomato;
      }
      input {
        border: 2px solid black;
        width: 300px;
        height: 20px;
        vertical-align: middle;
      }
      select {
        border: 2px solid red;
        width: 300px;
        border-radius: 0px;
        height: 30px;
      }
      #idInput {
        border: 2px solid red;
        width: 300px;
        height: 20px;
      }
      button {
        border: 2px solid black;
        width: 300px;
      }
    </style>
    <title>EmpowerMX</title>
  </head>
  <body>
    <script>
      function generateLink(id, action, env) {
        let envString = env.replace("EMXFC_", "");
        if (env == "") {
          envString = "QAJBWF15";
        }
        if (!id || !action) {
          return null;
        }
        if (action === "view") {
          return `emxapp://${envString}/offline/xl/esTaskExecution/RetrieveEditRoutineTaskCard.ajax?action_forward=view&/taskCardRoot/taskCard/@taskCardId=${id}&/EMX_OFFLINE=true`;
        } else if (action === "etc") {
          return `emxapp://${envString}/offline/xl/esTaskExecution/routineWorkTaskCard.ajax?service_lookup=initialize&/taskCardRoot/taskCard/@taskCardId=${id}&/EMX_OFFLINE=true`;
        } else {
          alert("Please enter taskCardId and action");
        }
      }
      function handleSubmit() {
        const id = document.getElementById("idInput").value.trim();
        const env =
          document.getElementById("envInput").value.toUpperCase() ?? null;
        const action = document.getElementById("actionSelect").value;

        const result = generateLink(id, action, env);

        const container = document.getElementById("generatedLinkContainer");
        container.innerHTML = "";

        if (result) {
          const link = document.createElement("a");
          link.href = result;
          link.textContent = "Open Generated Link";

          container.appendChild(link);
        } else {
          container.innerHTML =
            "<p style='color:red;'>Please enter ID and select Action</p>";
        }
      }
    </script>

    <h1>My Tasks</h1>
    <label for="idInput" id="label">Task Card Id</label>
    <input type="text" id="idInput" placeholder="Enter Task Card Id" />
    <br />
    <span class="comment">Please enter only User Assigned Task Card Id</span>
    <br /><br />
    <label for="actionSelect" id="label">Action:</label>
    <select id="actionSelect">
      <option value="">-- Select Action --</option>
      <option value="view">View</option>
      <option value="etc">Work Task Card</option>
    </select>
    <br /><br />
    <label for="envInput" id="label">Environment</label>
    <input type="text" id="envInput" placeholder="Please Enter Environment" />
    <br /><br />
    <strong
      >Note:
      <span>
        If the environment field is not supplied, it will be defaulted to
        QAJBWF15
      </span></strong
    >
    <br /><br />
    <button onclick="handleSubmit()">Submit</button>
    <br /><br />
    <div id="generatedLinkContainer"></div>
  </body>
</html>
